repos:
  - repo: local
    hooks:
      - id: cargo-check
        name: cargo check
        entry: cargo check --manifest-path backend/Cargo.toml
        pass_filenames: false
        language: system
        types: [rust]
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path backend/Cargo.toml --all -- --check --color always
        pass_filenames: false
        language: system
        types: [rust]
        working_directory: backend
