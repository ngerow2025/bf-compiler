<div style="padding: 1.5rem 0;">
  <div style="
    background: #ffffff;
    border: 0.5px solid rgba(0,0,0,0.15);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    width: max-content;
    min-width: 280px;
    font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;
  ">

    <div style="text-align: center; margin-bottom: 14px;">
      <p style="margin: 0 0 3px; font-size: 15px; font-weight: 500; color: #111111;">Function</p>
      <p style="margin: 0; font-size: 12px; color: #666666;">Function Definition</p>
    </div>

    <div style="height: 0.5px; background: rgba(0,0,0,0.15); margin-bottom: 14px;"></div>

    <div style="display: flex; flex-direction: column; gap: 8px; font-size: 13px;">

      <div style="display: flex; justify-content: space-between; align-items: center; gap: 32px;">
        <span style="color: #666666; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;">name</span>
        <span style="background: #e6f1fb; color: #185fa5; padding: 2px 10px; border-radius: 8px; font-size: 13px;">myFunction</span>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; gap: 32px;">
        <span style="color: #666666; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;">params</span>
        <span style="color: #111111;">(id: <span style="color: #185fa5;">number</span>, active: <span style="color: #185fa5;">boolean</span>)</span>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; gap: 32px;">
        <span style="color: #666666; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;">id</span>
        <span style="color: #3b6d11;">42</span>
      </div>

    </div>
  </div>
</div>
