
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev.backend
    volumes:
      - ./backend:/app/backend
      - ./3rd_party:/app/3rd_party
      - ./web-frontend:/app/web-frontend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./web-frontend:/app/web-frontend
    depends_on:
      - backend
    environment:
      - CI=true
